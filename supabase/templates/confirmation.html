<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your code</title>
  </head>
  <body style="margin:0; padding:0; background-color:#10131a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#10131a; padding:40px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="max-width:480px; width:100%; background-color:#171b24; border:1px solid #262c3a; border-radius:16px; padding:40px;">
            <tr>
              <td align="center" style="padding-bottom:24px;">
                <span style="font-weight:800; font-size:18px; letter-spacing:0.08em; text-transform:uppercase; color:#eef1f6;">mikirystudios</span>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding-bottom:8px;">
                <p style="margin:0; font-size:14px; color:#7d8794;">Confirm your email to finish creating your account</p>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding:16px 0 32px;">
                <span style="display:inline-block; font-size:40px; font-weight:800; letter-spacing:0.12em; color:#e8b339;">{{ .Token }}</span>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding-top:16px;">
                <p style="margin:0; font-size:13px; line-height:1.6; color:#7d8794;">
                  This code can only be used once. It expires in 15 minutes.<br />
                  If you didn&#39;t request this, you can safely ignore this email.
                </p>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding-top:24px;">
                <p style="margin:0; font-size:12px; color:#7d8794;">
                  <a href="https://mikirystudios.com/privacy" style="color:#7d8794; text-decoration:underline;">Privacy policy</a>
                  &nbsp;&nbsp;
                  <a href="https://mikirystudios.com/terms" style="color:#7d8794; text-decoration:underline;">Terms of service</a>
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
